# ================================
# 测试环境配置 — H2 内存数据库
# ================================
spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

# JWT 测试配置
jwt:
  secret: TestSecretKey@2024#ForUnitTest@DessertShop
  expire: 43200000

# MyBatis 配置
mybatis:
  configuration:
    map-underscore-to-camel-case: true

# 关闭分页插件合理性检查（测试时）
pagehelper:
  reasonable: false
  helper-dialect: mysql

# 关闭 OSS 自动配置（测试不需要）
aliyun:
  oss:
    endpoint:
    bucketName:
    region:
