spring:
  application:
    name: dessertshop-web-management
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB
  #mysql连接配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/dessertshop
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}
  # 密码迁移配置
  password:
    migration:
      # 首次运行时设置为true，迁移完成后设置为false
      enabled: false

# JWT配置
jwt:
  # 签名密钥 — 生产环境请通过环境变量 JWT_SECRET 覆盖
  secret: ${JWT_SECRET:DessertShop@2024#SecureKey!@#$%^&*}
  # Token过期时间（毫秒），默认12小时
  expire: 43200000

mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

#分页查询防不规范
pagehelper:
  reasonable: true
  helper-dialect: mysql

#spring事务管理日志
logging:
  level:
    org.springframework.jdbc.support.JdbcTransactionManager: debug

# Knife4j / SpringDoc API 文档配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-swagger-models: true
    enable-footer: false

#阿里云OSS
aliyun:
  oss:
    endpoint: https://oss-cn-beijing.aliyuncs.com
    bucketName: yuka-javaweb
    region: cn-beijing
